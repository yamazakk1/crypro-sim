<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админ | CryptoSim</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9; --text-secondary: #8b949e; --green: #3fb950; --red: #f85149; --blue: #58a6ff; --orange: #d2991d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 700; font-size: 18px; color: var(--green); }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 16px 0; }
        th, td { padding: 12px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
        th { background: #21262d; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #1c2128; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; color: white; }
        .btn-green { background: #238636; border-color: #238636; }
        .btn-red { background: #da3633; border-color: #da3633; }
        .btn-blue { background: #1f6feb; border-color: #1f6feb; }
        .btn-gray { background: #21262d; }
        input { padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin: 4px; }
        input:focus { outline: none; border-color: var(--blue); }
        .form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        #accessDenied { display: none; text-align: center; padding: 80px 20px; }
        #accessDenied h2 { color: var(--red); font-size: 32px; margin-bottom: 16px; }
        #accessDenied a { color: var(--blue); }
        #adminContent { display: none; }
    </style>
</head>
<body>
    <div id="accessDenied"><h2>🚫 Доступ запрещён</h2><p>Только для администраторов.</p><p><a href="/assets.html">← На рынок</a></p></div>
    <div id="adminContent">
        <div class="header"><span class="brand">CryptoSim</span> · Админ-панель <a href="/assets.html" style="color:var(--blue);margin-left:12px;">← На рынок</a></div>
        <div class="container">
            <div class="form-row">
                <input id="symbol" placeholder="Символ (BTC)">
                <input id="fullname" placeholder="Название (Bitcoin)">
                <input id="price" placeholder="Цена (100)" type="number" step="any" style="width:120px;">
                <button class="btn btn-green" onclick="create()">Создать</button>
            </div>
            <p id="createMsg" style="font-size:14px;"></p>
            <table id="tbl"><tr><th>Символ</th><th>Название</th><th>Статус</th><th>Действия</th></tr></table>
        </div>
    </div>
    <script>
        const token = localStorage.getItem("token");
        async function check() {
            if (!token) { document.getElementById("accessDenied").style.display="block"; return; }
            const r = await fetch("/getme", { headers: { "Authorization": "Bearer "+token } });
            if (!r.ok || (await r.json()).role !== "admin") { document.getElementById("accessDenied").style.display="block"; return; }
            document.getElementById("adminContent").style.display="block"; load();
        }
        async function load() {
            const r = await fetch("/api/assets"); const d = await r.json(); const t = document.getElementById("tbl");
            while (t.rows.length>1) t.deleteRow(1);
            d.assets.forEach(a => { const row = t.insertRow(); row.innerHTML = `<td>${a.symbol}</td><td>${a.full_name}</td><td>${a.is_active?'✅':'❌'}</td><td><button class="btn ${a.is_active?'btn-blue':'btn-green'}" onclick="toggle('${a.id}',${a.is_active})">${a.is_active?'Деактивировать':'Активировать'}</button> <button class="btn btn-red" onclick="del('${a.id}')">Удалить</button></td>`; });
        }
        async function create() {
            const s = document.getElementById("symbol").value.trim(), f = document.getElementById("fullname").value.trim(), p = document.getElementById("price").value||"100";
            if (!s||!f) return;
            const r = await fetch("/api/assets", { method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token}, body:JSON.stringify({symbol:s,full_name:f,initial_price:+p}) });
            document.getElementById("createMsg").textContent = r.status===201 ? "Создано!" : "Ошибка"; load();
        }
        async function toggle(id, active) { await fetch(`/api/assets/${id}/${active?"deactivate":"activate"}`, { method:"POST", headers:{"Authorization":"Bearer "+token} }); load(); }
        async function del(id) { if (confirm("Удалить?")) { await fetch(`/api/assets/${id}`, { method:"DELETE", headers:{"Authorization":"Bearer "+token} }); load(); } }
        check();
    </script>
</body>
</html>
