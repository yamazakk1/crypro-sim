<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | CryptoSim</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #4CAF50; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        input { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-create { background: #4CAF50; padding: 10px 20px; }
        .btn-deact { background: #ff9800; }
        .btn-act { background: #2196F3; }
        .btn-del { background: #f44336; }
        .btn-back { background: #666; }
        button:hover { opacity: 0.8; }
        .create-form { background: #f5f5f5; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .error { color: #f44336; }
        .success { color: #4CAF50; }
        #accessDenied { display: none; background: #ffebee; border: 2px solid #f44336; border-radius: 8px; padding: 40px; text-align: center; margin: 50px 0; }
        #accessDenied h2 { color: #f44336; font-size: 28px; }
        #accessDenied a { color: #2196F3; font-size: 16px; }
        #adminContent { display: none; }
    </style>
</head>
<body>
    <div id="accessDenied">
        <h2>🚫 Access Denied</h2>
        <p>У вас нет прав администратора.</p>
        <p><a href="/assets.html">← Вернуться к списку валют</a></p>
    </div>

    <div id="adminContent">
        <h1>⚙️ Админ-панель</h1>
        <a href="/assets.html"><button class="btn-back">← К валютам</button></a>
        
        <div class="create-form">
            <h3>Создать новую валюту</h3>
            <input id="symbol" placeholder="Символ (BTC)">
            <input id="fullname" placeholder="Название (Bitcoin)">
            <input id="price" placeholder="Начальная цена (100.00)" type="number" step="any">
            <button class="btn-create" onclick="createAsset()">Создать</button>
            <p id="createResult"></p>
        </div>

        <h3>Управление валютами</h3>
        <table id="adminTable">
            <tr><th>Символ</th><th>Название</th><th>Статус</th><th>Действия</th></tr>
        </table>
    </div>

    <script>
        const token = localStorage.getItem("token");

        async function checkAccess() {
            if (!token) { showDenied(); return; }
            try {
                const resp = await fetch("/getme", { headers: { "Authorization": "Bearer " + token } });
                if (!resp.ok) { localStorage.removeItem("token"); showDenied(); return; }
                const user = await resp.json();
                user.role === "admin" ? (showAdmin(), loadAdmin()) : showDenied();
            } catch (e) { showDenied(); }
        }

        function showDenied() { document.getElementById("accessDenied").style.display = "block"; document.getElementById("adminContent").style.display = "none"; }
        function showAdmin() { document.getElementById("accessDenied").style.display = "none"; document.getElementById("adminContent").style.display = "block"; }

        async function loadAdmin() {
            const resp = await fetch("/api/assets");
            const data = await resp.json();
            const table = document.getElementById("adminTable");
            while (table.rows.length > 1) table.deleteRow(1);
            data.assets.forEach(a => {
                const row = table.insertRow();
                row.innerHTML = `
                    <td><strong>${a.symbol}</strong></td>
                    <td>${a.full_name}</td>
                    <td>${a.is_active ? '✅ Активна' : '❌ Неактивна'}</td>
                    <td>
                        <button class="${a.is_active ? 'btn-deact' : 'btn-act'}" onclick="toggleAsset('${a.id}', ${a.is_active})">${a.is_active ? 'Деактивировать' : 'Активировать'}</button>
                        <button class="btn-del" onclick="deleteAsset('${a.id}')">Удалить</button>
                    </td>`;
            });
        }

        async function createAsset() {
            const symbol = document.getElementById("symbol").value.trim();
            const fullname = document.getElementById("fullname").value.trim();
            const price = document.getElementById("price").value || "100.00";
            const r = document.getElementById("createResult");
            if (!symbol || !fullname) { r.className = "error"; r.textContent = "❌ Символ и название обязательны"; return; }
            const resp = await fetch("/api/assets", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ symbol, full_name: fullname, initial_price: parseFloat(price) })
            });
            if (resp.status === 201) { r.className = "success"; r.textContent = "✅ Валюта создана!"; setTimeout(() => location.reload(), 500); }
            else { const data = await resp.json().catch(() => ({})); r.className = "error"; r.textContent = "❌ " + (data.error || "Ошибка"); }
        }

        async function toggleAsset(id, active) {
            await fetch(`/api/assets/${id}/${active ? "deactivate" : "activate"}`, { method: "POST", headers: { "Authorization": "Bearer " + token } });
            location.reload();
        }

        async function deleteAsset(id) {
            if (confirm("Удалить валюту?")) {
                await fetch(`/api/assets/${id}`, { method: "DELETE", headers: { "Authorization": "Bearer " + token } });
                location.reload();
            }
        }

        checkAccess();
    </script>
</body>
</html>
