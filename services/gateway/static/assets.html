<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Рынок | CryptoSim</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9; --text-secondary: #8b949e; --green: #3fb950; --red: #f85149; --blue: #58a6ff; --orange: #d2991d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .brand { font-weight: 700; font-size: 18px; color: var(--green); }
        .header-links { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .header-links a { color: var(--blue); text-decoration: none; }
        .header-links a:hover { text-decoration: underline; }
        .layout { display: flex; gap: 20px; padding: 20px; max-width: 1300px; margin: 0 auto; }
        .table-panel { flex: 1; min-width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .chart-panel { flex: 2; min-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; }
        tr { cursor: pointer; }
        tr:hover { background: #1c2128; }
        tr.selected { background: #1a2332; }
        .up { color: var(--green); }
        .down { color: var(--red); }
        .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text); }
        .btn-green { background: #238636; border-color: #238636; color: white; }
        .btn-red { background: #da3633; border-color: #da3633; color: white; }
        .btn:hover { opacity: 0.85; }
        .hidden { display: none; }
        #chartContainer { width: 100%; height: 380px; }
        #chartSvg { width: 100%; height: 100%; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .chart-header h3 { font-size: 16px; }
        .zoom-hint { font-size: 12px; color: var(--text-secondary); }
        .axis-label { font-size: 10px; fill: var(--text-secondary); }
        .grid-line { stroke: var(--border); stroke-width: 0.5; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 360px; }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content p { margin-bottom: 8px; color: var(--text-secondary); }
        .modal-content strong { color: var(--text); }
        .modal-content input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin: 8px 0; }
        .modal-content input:focus { outline: none; border-color: var(--blue); }
        .modal-content button { width: 100%; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="brand">CryptoSim</span>
        <div class="header-links">
            <span id="userInfo" style="color:var(--text-secondary);"></span>
            <a id="adminLink" href="/admin.html" class="hidden">Админ</a>
            <a href="/portfolio.html">Портфель</a>
            <a id="loginLink" href="/login.html">Войти</a>
            <button id="logoutBtn" class="btn" onclick="logout()" style="display:none;">Выйти</button>
        </div>
    </div>

    <div class="layout">
        <div class="table-panel">
            <table id="assetsTable">
                <tr><th>Символ</th><th>Цена</th><th>24ч</th><th></th></tr>
            </table>
        </div>
        <div class="chart-panel">
            <div class="chart-header">
                <h3 id="selectedSymbol">Выберите валюту</h3>
                <span class="zoom-hint"><span id="timeRange">1ч</span> | 🖱️ колёсико</span>
            </div>
            <div id="chartContainer"><svg id="chartSvg"></svg></div>
        </div>
    </div>

    <div id="tradeModal" class="modal">
        <div class="modal-content">
            <h3>Покупка</h3>
            <p>Валюта: <strong id="tradeSymbol"></strong></p>
            <p>Цена: <strong id="tradePrice"></strong> USDT</p>
            <input id="tradeQuantity" placeholder="Количество" type="number" step="any">
            <p>Итого: <strong id="tradeTotal">0</strong> USDT</p>
            <button class="btn btn-green" onclick="executeTrade()">Купить</button>
            <button class="btn" onclick="closeModal()" style="margin-top:6px;">Отмена</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        let priceMap = {}, priceHistory = {}, selectedAsset = null, currentRange = 3600;
        let tradeAssetID = "", tradeAssetPrice = 0;

        const ranges = [
            { label: "1м", s: 60 },{ label: "5м", s: 300 },{ label: "15м", s: 900 },{ label: "30м", s: 1800 },
            { label: "1ч", s: 3600 },{ label: "4ч", s: 14400 },{ label: "12ч", s: 43200 },{ label: "1д", s: 86400 },{ label: "7д", s: 604800 }
        ];
        function rl(s) { const m = ranges.find(r => r.s === s); return m ? m.label : s/3600+"ч"; }

        function connectWS() {
            const ws = new WebSocket("ws://localhost:8085/ws");
            ws.onmessage = (e) => {
                try { const p = JSON.parse(e.data); priceMap[p.asset_id] = { price: +p.price_usdt, change: +p.change_percent }; updateTable(); if (selectedAsset) updateChart(); } catch(ex) {}
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        async function loadAssets() {
            const resp = await fetch("/api/assets"); const data = await resp.json();
            const table = document.getElementById("assetsTable");
            while (table.rows.length > 1) table.deleteRow(1);
            data.assets.forEach(a => {
                const row = table.insertRow(); row.setAttribute("data-id", a.id);
                row.onclick = (e) => { if (!e.target.closest("button")) selectAsset(a.id, a.symbol); };
                const p = priceMap[a.id] || { price: 0, change: 0 };
                row.innerHTML = `<td><strong>${a.symbol}</strong></td><td>${p.price.toFixed(4)}</td><td class="${p.change>=0?'up':'down'}">${p.change.toFixed(2)}%</td><td><button class="btn btn-green" onclick="openBuy('${a.id}','${a.symbol}',${p.price})">Купить</button></td>`;
            });
        }

        function updateTable() {
            document.querySelectorAll("#assetsTable tr[data-id]").forEach(row => {
                const id = row.getAttribute("data-id"); const p = priceMap[id]; if (!p) return;
                row.cells[1].textContent = p.price.toFixed(4);
                row.cells[2].textContent = p.change.toFixed(2)+"%";
                row.cells[2].className = p.change>=0 ? "up" : "down";
                const btn = row.cells[3].querySelector("button");
                if (btn) btn.setAttribute("onclick", `openBuy('${id}','${row.cells[0].textContent}',${p.price})`);
            });
        }

        async function selectAsset(id, symbol) {
            selectedAsset = id; document.getElementById("selectedSymbol").textContent = symbol + " / USDT";
            document.querySelectorAll("#assetsTable tr").forEach(r => r.classList.remove("selected"));
            document.querySelector(`#assetsTable tr[data-id="${id}"]`)?.classList.add("selected");
            const to = new Date().toISOString(), from = new Date(Date.now() - currentRange*1000).toISOString();
            const resp = await fetch(`/api/market/prices/${id}?from=${from}&to=${to}`);
            const data = await resp.json(); priceHistory[id] = data.points || []; drawChart();
        }

        document.addEventListener("wheel", (e) => {
            if (!selectedAsset || !document.querySelector(".chart-panel").contains(e.target)) return;
            e.preventDefault();
            const idx = ranges.findIndex(r => r.s === currentRange);
            if (e.deltaY < 0 && idx < ranges.length-1) currentRange = ranges[idx+1].s;
            else if (e.deltaY > 0 && idx > 0) currentRange = ranges[idx-1].s;
            document.getElementById("timeRange").textContent = rl(currentRange);
            selectAsset(selectedAsset, document.getElementById("selectedSymbol").textContent.split(" /")[0]);
        }, { passive: false });

        function drawChart() {
            const points = priceHistory[selectedAsset] || [];
            if (points.length < 2) { document.getElementById("chartSvg").innerHTML = ""; return; }
            const svg = document.getElementById("chartSvg"), w = svg.clientWidth || 600, h = svg.clientHeight || 380;
            const pad = { l: 70, r: 20, t: 20, b: 40 };
            const prices = points.map(p => +p.close);
            const min = Math.min(...prices)*0.999, max = Math.max(...prices)*1.001, rng = max-min || 1;
            const sx = i => pad.l + (i/(points.length-1))*(w-pad.l-pad.r);
            const sy = p => h - pad.b - ((p-min)/rng)*(h-pad.t-pad.b);
            let d = ""; points.forEach((p,i) => d += (i?"L":"M")+sx(i)+","+sy(+p.close)+" ");
            const color = +points[points.length-1].close >= +points[0].close ? "#3fb950" : "#f85149";
            let html = "";
            for (let i=0; i<=5; i++) { const pr = min+rng*i/5, y = sy(pr); html += `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" class="grid-line"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" class="axis-label">${pr<1?pr.toFixed(4):pr.toFixed(2)}</text>`; }
            for (let i=0; i<=Math.min(6,points.length); i++) { const idx = Math.floor(i*(points.length-1)/Math.min(6,points.length)); html += `<text x="${sx(idx)}" y="${h-5}" text-anchor="middle" class="axis-label">${new Date(points[idx].timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</text>`; }
            html += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>`;
            const lp = +points[points.length-1].close, lx = sx(points.length-1), ly = sy(lp);
            html += `<rect x="${lx-45}" y="${ly-16}" width="90" height="18" rx="4" fill="${color}"/><text x="${lx}" y="${ly-3}" text-anchor="middle" fill="white" font-size="11" font-weight="bold">${lp.toFixed(4)}</text>`;
            svg.innerHTML = html;
        }

        function updateChart() { if (!selectedAsset) return; const p = priceMap[selectedAsset]; if (!p) return; const pts = priceHistory[selectedAsset] || []; pts.push({ close: p.price, timestamp: new Date().toISOString() }); if (pts.length > 200) pts.shift(); priceHistory[selectedAsset] = pts; drawChart(); }

        function openBuy(id, symbol, price) { if (!token) { window.location.href = "/login.html"; return; } tradeAssetID = id; tradeAssetPrice = price; document.getElementById("tradeSymbol").textContent = symbol; document.getElementById("tradePrice").textContent = "$"+price.toFixed(4); document.getElementById("tradeQuantity").value = ""; document.getElementById("tradeTotal").textContent = "$0"; document.getElementById("tradeModal").classList.add("active"); }
        function closeModal() { document.getElementById("tradeModal").classList.remove("active"); }
        document.getElementById("tradeQuantity").addEventListener("input", function() { document.getElementById("tradeTotal").textContent = "$"+((+this.value||0)*tradeAssetPrice).toFixed(2); });
        async function executeTrade() { const q = document.getElementById("tradeQuantity").value; if (!q || +q <= 0) return; const r = await fetch("/api/trading/buy", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer "+token }, body: JSON.stringify({ asset_id: tradeAssetID, quantity: q }) }); if (r.ok) { closeModal(); alert("Куплено!"); } else { const d = await r.json().catch(()=>({})); alert("Ошибка: "+(d.error||"")); } }

        async function checkUser() { if (!token) { document.getElementById("userInfo").textContent = ""; return; } try { const r = await fetch("/getme", { headers: { "Authorization": "Bearer "+token } }); if (r.ok) { const u = await r.json(); document.getElementById("userInfo").textContent = u.username; document.getElementById("loginLink").style.display = "none"; document.getElementById("logoutBtn").style.display = "inline"; if (u.role === "admin") document.getElementById("adminLink").classList.remove("hidden"); } } catch(e) {} }
        function logout() { localStorage.removeItem("token"); window.location.href = "/login.html"; }

        window.addEventListener("resize", drawChart);
        checkUser(); loadAssets(); connectWS();
    </script>
</body>
</html>
