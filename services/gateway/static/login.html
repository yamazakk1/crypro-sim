<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход | CryptoSim</title>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9; --text-secondary: #8b949e; --green: #3fb950; --blue: #58a6ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 380px; }
        .brand { font-size: 24px; font-weight: 700; color: var(--green); text-align: center; margin-bottom: 24px; }
        input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin-bottom: 12px; }
        input:focus { outline: none; border-color: var(--blue); }
        button { width: 100%; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--blue); color: white; }
        button:hover { opacity: 0.85; }
        .msg { text-align: center; margin-top: 12px; font-size: 14px; }
        .error { color: #f85149; }
        .success { color: var(--green); }
        a { color: var(--blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-box">
        <div class="brand">CryptoSim</div>
        <input id="email" placeholder="Email" type="email" autocomplete="off">
        <input id="password" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <p id="result" class="msg"></p>
        <p class="msg"><a href="/register.html">Нет аккаунта? Зарегистрироваться</a></p>
    </div>
    <script>
        async function login() {
            const r = document.getElementById("result"); r.className = "msg"; r.textContent = "";
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("password").value;
            if (!e || !p) { r.className = "msg error"; r.textContent = "Все поля обязательны"; return; }
            try {
                const resp = await fetch("/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: e, password: p }) });
                const d = await resp.json();
                if (resp.ok) { localStorage.setItem("token", d.token); r.className = "msg success"; r.innerHTML = 'Вход выполнен! <a href="/assets.html">К рынку</a>'; }
                else { r.className = "msg error"; r.textContent = d.error || "Неверный email или пароль"; }
            } catch (x) { r.className = "msg error"; r.textContent = "Ошибка соединения"; }
        }
    </script>
</body>
</html>
