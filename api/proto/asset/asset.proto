syntax = "proto3";

package asset;

option go_package = "crypto-simulator/pkg/pb/asset";

service AssetService {
    rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
    rpc GetAsset(GetAssetRequest) returns (Asset);
    rpc CreateAsset(CreateAssetRequest) returns (Asset);
    rpc UpdateAsset(UpdateAssetRequest) returns (Asset);
    rpc DeactivateAsset(DeactivateAssetRequest) returns (Asset);
    rpc ActivateAsset(ActivateAssetRequest) returns (Asset);
    rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetResponse);
}

message Asset {
    string id = 1;
    string symbol = 2;
    string fullname = 3;
    bool is_active = 4;
    string created_at = 5;
    float initial_price = 6;
}

message ListAssetsRequest {}
message ListAssetsResponse {
    repeated Asset assets = 1;
}

message GetAssetRequest {
    string id = 1;
}

message CreateAssetRequest {
    float initial_price = 1;
    string symbol = 2;
    string fullname = 3;
}

message UpdateAssetRequest {
    string id = 1;
    string fullname = 2;
}

message DeactivateAssetRequest {
    string id = 1;
}

message ActivateAssetRequest {
    string id = 1;
}

message DeleteAssetRequest {
    string id = 1;
}

message DeleteAssetResponse {
    bool success = 1;
}