version: '3.9'

services:
  gateway:
    build: 
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    environment:
      PORT: ${GATEWAY_PORT}
      AUTH_ADDR: auth-service:${AUTH_PORT}
      ASSET_ADDR: asset-service:${ASSET_PORT}
      MARKET_ADDR: market-service:${MARKET_PORT}
      TRADING_ADDR: trading-service:${TRADING_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service

  auth-service:
    build: 
      context: .
      dockerfile: ./services/auth/Dockerfile
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      PORT: ${AUTH_PORT}
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully

  market-service:
    build:
      context: .
      dockerfile: ./services/market/Dockerfile
    ports:
      - "${MARKET_PORT}:${MARKET_PORT}"
    environment:
      PORT: ${MARKET_PORT}
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
  trading-service:
    build:
      context: .
      dockerfile: ./services/trading/Dockerfile
    ports:
      - "${TRADING_PORT}:${TRADING_PORT}"
    environment:
      PORT: ${TRADING_PORT}
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
  redis:
    image: redis:7-alpine
    ports: 
      - 6379:6379

  ws-hub:
    build:
      context: .
      dockerfile: ./services/ws_hub/Dockerfile
    ports: 
      - "${WS_HUB_PORT}:${WS_HUB_PORT}"
    environment:
      PORT: ${WS_HUB_PORT}
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
  asset-service:
    build:
      context: .
      dockerfile: ./services/asset/Dockerfile
    ports:
      - "${ASSET_PORT}:${ASSET_PORT}"
    environment:
      PORT: ${ASSET_PORT}
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate 
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
  seed:
    build:
      context: .
      dockerfile: ./cmd/seed/Dockerfile
    environment:
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles:
      - seed
    restart: "no"

volumes:
  postgres_data: